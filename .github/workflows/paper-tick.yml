name: paper-tick

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: paper-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run paper-trading tick (unless a live Runner is active)
        run: |
          AGE_MIN=$(node -e "try{const j=require('./tester/data/results.json');console.log(Math.round((Date.now()-Date.parse(j.generated_at))/60000))}catch(e){console.log(9999)}")
          echo "last data heartbeat: ${AGE_MIN} min ago"
          if [ "$AGE_MIN" -lt 30 ]; then
            echo "a Runner machine is active — cloud tick skipped"
          else
            node tester/index.js tick
          fi
      - name: Commit results
        run: |
          git config user.name "polymark-bot"
          git config user.email "polymark-bot@users.noreply.github.com"
          git add tester/data/polymark.db tester/data/results.json RESULTS.md
          if git diff --cached --quiet; then
            echo "nothing changed"
          else
            git commit -m "tick: $(date -u +%FT%TZ)"
            git pull --rebase -X ours origin main || true
            git push
          fi
